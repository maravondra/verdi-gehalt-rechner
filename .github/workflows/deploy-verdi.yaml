name: 🚀 Deploy to Prod

on:
  push:
    branches:
      - main

jobs:
  deploy-deutschland:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repozitáře
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🔧 Nastavení Node.js prostředí
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Instalace závislostí
        run: npm ci --force

      - name: 🧰 Instalace nástroje jq
        run: sudo apt-get install jq

      - name: 🏗️ Build Angular aplikace (deutschland)
        run: npm run build

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1 # Frankfurt

      - name: 📤 Nasazení na AWS S3 (Místo FTP)
        run: |
          aws s3 sync dist/verdi-gehalt-rechner/browser/ s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete

      - name: ⚡ Invalidační CloudFront Cache (Aby se změny projevily hned)
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"